<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Local Dashboard</title>
    <link
      rel="icon"
      href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><rect width="64" height="64" rx="16" fill="%232563eb"/><path d="M14 21h36v24H14z" fill="white"/><path d="M18 25h28v16H18z" fill="%23111827"/><path d="M25 51h14" stroke="white" stroke-width="5" stroke-linecap="round"/></svg>'
    />
    <style>
      :root {
        color-scheme: dark;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background: #111827;
        color: #f9fafb;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top left, rgba(59, 130, 246, 0.28), transparent 32rem),
          radial-gradient(circle at bottom right, rgba(16, 185, 129, 0.22), transparent 28rem),
          #111827;
      }

      main {
        width: min(92vw, 720px);
        padding: 32px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 24px;
        background: rgba(17, 24, 39, 0.78);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
        backdrop-filter: blur(14px);
      }

      h1 {
        margin: 0 0 8px;
        display: flex;
        align-items: center;
        gap: 14px;
        font-size: clamp(32px, 6vw, 56px);
        letter-spacing: -0.05em;
      }

      .logo {
        display: grid;
        width: 52px;
        height: 52px;
        place-items: center;
        border-radius: 16px;
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        box-shadow: 0 16px 36px rgba(37, 99, 235, 0.35);
      }

      .logo svg,
      .app-icon svg {
        width: 28px;
        height: 28px;
      }

      p {
        margin: 0 0 28px;
        color: #cbd5e1;
        font-size: 17px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 16px;
      }

      a,
      button {
        display: flex;
        align-items: center;
        gap: 14px;
        width: 100%;
        box-sizing: border-box;
        border: 0;
        border-radius: 16px;
        padding: 18px 20px;
        color: #f9fafb;
        font: inherit;
        font-weight: 700;
        text-align: left;
        text-decoration: none;
        cursor: pointer;
        transition:
          transform 0.18s ease,
          box-shadow 0.18s ease;
      }

      .app-icon {
        display: grid;
        flex: 0 0 auto;
        width: 44px;
        height: 44px;
        place-items: center;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.16);
      }

      .app-text {
        min-width: 0;
      }

      a:hover,
      button:hover {
        transform: translateY(-2px);
        box-shadow: 0 14px 36px rgba(0, 0, 0, 0.25);
      }

      .primary {
        background: linear-gradient(135deg, #2563eb, #7c3aed);
      }

      .secondary {
        background: linear-gradient(135deg, #059669, #0891b2);
      }

      .open-all {
        margin-top: 16px;
        background: linear-gradient(135deg, #f97316, #db2777);
      }

      small {
        display: block;
        margin-top: 6px;
        color: rgba(255, 255, 255, 0.72);
        font-weight: 500;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>
        <span class="logo" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M4 6.5h16v10H4z" fill="white" />
            <path d="M6 8.5h12v6H6z" fill="#111827" />
            <path d="M9 20h6" stroke="white" stroke-width="2" stroke-linecap="round" />
          </svg>
        </span>
        VND - Local Tools
      </h1>
      <!-- <p>Một bookmark để m  ở nhanh 2 web nội bộ.</p> -->

      <div class="grid">
        <a class="primary" href="http://172.16.18.160:9090/" target="_blank" rel="noreferrer">
          <span class="app-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none">
              <path d="M5 6h14v12H5z" fill="white" />
              <path d="M8 9h8v6H8z" fill="#059669" />
              <path d="M9 21h6" stroke="white" stroke-width="2" stroke-linecap="round" />
            </svg>
          </span>
          <span class="app-text">
            Vaithuhayho Webapp
            <small>http://172.16.18.160:9090</small>
          </span>
        </a>
        <a class="secondary" href="http://172.16.18.107:6789/" target="_blank" rel="noreferrer">
          <span class="app-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none">
              <path d="M4 5h16v14H4z" fill="white" />
              <path d="M7 8h10M7 12h7M7 16h5" stroke="#2563eb" stroke-width="2" stroke-linecap="round" />
            </svg>
          </span>
          <span class="app-text">
            Utility Tool
            <small>http://172.16.18.107:6789</small>
          </span>
        </a>


      </div>

      <!-- <button class="open-all" type="button" onclick="openBoth()">
        <span class="app-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M6 6h12v12H6z" fill="white" />
            <path d="M12 8v8M8 12h8" stroke="#f97316" stroke-width="2" stroke-linecap="round" />
          </svg>
        </span>
        <span class="app-text">
          Mở cả 2 web
          <small>Mở mỗi web trong một tab mới</small>
        </span>
      </button> -->
    </main>

    <script>
      function openBoth() {
        window.open("http://172.16.18.107:6789/", "_blank", "noopener,noreferrer");
        window.open("http://172.16.18.160:9090/", "_blank", "noopener,noreferrer");
      }
    </script>
  </body>
</html>
